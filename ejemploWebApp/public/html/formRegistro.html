<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css" type="text/css" />    
</head>
<body>
    <h2>Formulario de registro</h2>
    <form id="miFormulario" novalidate>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" 
               pattern="[a-zA-Z\s]{3,50}" 
               placeholder="Ej. Juan López" required autofocus>
        <span class="mensaje" id="error-nombre"></span>

        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" name="contrasena" 
               pattern="^[a-zA-Z0-9]{6,13}$" 
               required>
        <span class="mensaje" id="error-contrasena"></span>

        <label for="concontrasena">Confirmacion contraseña:</label>
        <input type="password" id="concontrasena" name="concontrasena" 
               pattern="^[a-zA-Z0-9]{6,13}$" 
               required>
        <span class="mensaje" id="error-concontrasena"></span>

        <label for="preguntarc">Pregunta recuperación cuenta:</label>
        <input type="text" id="preguntarc" name="preguntarc" 
               required>
        <span class="mensaje" id="error-preguntarc"></span>

        <label for="respuestarc">respuesta recuperación cuenta:</label>
        <input type="text" id="respuestarc" name="respuestarc" 
               required>
        <span class="mensaje" id="error-respuestarc"></span>
        
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"
               placeholder="correo@ejemplo.com" required>
        <span class="mensaje" id="error-correo"></span>

        <div class="btnContainer">            
            <button class="submit" type="submit">Enviar</button>
            <button class="reset" type="reset">Limpiar</button>
        </div>
        
    </form>

    <pre id="resultado"></pre>

    <script src="/js/validateFormR.js"></script>


</body>
</html>
